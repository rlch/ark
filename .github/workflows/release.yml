# Release workflow for Ark.
#
# Covers build-site T-133 (cavekit-distribution R2):
#   - Tag-driven: push a `vX.Y.Z` tag → this workflow runs.
#   - Matrix: aarch64 + x86_64 on macOS + Linux (no Windows — per
#     cavekit-distribution R4).
#   - Artifacts per target: tarball containing `ark` + `ark-hook`, plus a
#     SHA256 checksum file. `ark` embeds the wasm plugins at build time via
#     `crates/cli/build.rs` (ARK_BUILD_WASM=1) per R3.
#   - A GitHub Release is created automatically on the tag and all target
#     tarballs + checksums are uploaded to it.
#
# Design notes:
#   * The `[workspace.metadata.dist]` block in root Cargo.toml describes the
#     same contract in cargo-dist's own schema. When cargo-dist is run
#     locally in the future (`cargo dist init`), it should regenerate this
#     workflow to match. Until then this hand-written workflow carries the
#     contract; keep the two in sync.
#   * aarch64-linux is cross-compiled from ubuntu using the standard
#     gcc-aarch64-linux-gnu toolchain — no docker / qemu needed, which
#     keeps the job fast and matches cargo-dist's default runner choice.
#   * SHA256 is computed with `shasum -a 256` on macOS and `sha256sum` on
#     linux. Both runners agree on the file format: `<hex>  <filename>`.
#   * No secrets required beyond the default GITHUB_TOKEN — the release job
#     uploads to the same repo, which `contents: write` covers.
#   * `pr-run-mode = "plan"` in Cargo.toml means PRs skip this workflow
#     entirely (it only triggers on tag push, below). CI coverage for PRs
#     lives in ci.yml.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must exist as v*)"
        required: true

env:
  CARGO_TERM_COLOR: always
  # Needed so `crates/cli/build.rs` embeds the wasm plugins into the `ark`
  # binary (cavekit-distribution R3). Without this the release artifact
  # would be missing the embedded plugin bytes.
  ARK_BUILD_WASM: "1"

jobs:
  # ---------------------------------------------------------------------------
  # build: cross-compile `ark` + `ark-hook` for each release target. Produces
  # a tarball + SHA256 checksum per target as a workflow artifact.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_ext: tar.xz
            shasum: shasum -a 256
          - target: x86_64-apple-darwin
            runner: macos-13
            archive_ext: tar.xz
            shasum: shasum -a 256
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive_ext: tar.xz
            shasum: sha256sum
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive_ext: tar.xz
            shasum: sha256sum
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch supplies inputs.tag; tag-push uses github.ref.
          # Without this, workflow_dispatch would check out the default
          # branch tip instead of the requested tag.
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install wasm32-wasip1 target (for embedded plugins)
        run: rustup target add wasm32-wasip1

      - name: Install cross-compile toolchain (linux-aarch64)
        if: matrix.apt_packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross-compile linker (linux-aarch64)
        if: matrix.linker
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build wasm plugins (release profile)
        run: |
          cargo build --target wasm32-wasip1 --release \
            -p ark-plugin-status \
            -p ark-plugin-picker

      - name: Build release binaries
        run: |
          cargo build --target ${{ matrix.target }} --release \
            -p ark-cli \
            -p ark-hook

      - name: Stage artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [ "$version" = "${GITHUB_REF_NAME}" ]; then
            # workflow_dispatch path: ref_name is the branch, not a tag.
            version="${{ github.event.inputs.tag }}"
            version="${version#v}"
          fi
          name="ark-${version}-${{ matrix.target }}"
          dir="dist/${name}"
          mkdir -p "${dir}"
          cp "target/${{ matrix.target }}/release/ark" "${dir}/ark"
          cp "target/${{ matrix.target }}/release/ark-hook" "${dir}/ark-hook"
          cp README.md "${dir}/" 2>/dev/null || true
          cp LICENSE "${dir}/" 2>/dev/null || true
          tar -C dist -cJf "dist/${name}.tar.xz" "${name}"
          ( cd dist && ${{ matrix.shasum }} "${name}.tar.xz" > "${name}.tar.xz.sha256" )
          echo "archive=dist/${name}.tar.xz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.xz.sha256" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.checksum }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # wasm-release: build the standalone `ark-plugin-status` +
  # `ark-plugin-picker` wasm modules and publish them as release assets
  # alongside the per-target tarballs (cavekit-distribution R3 / T-135).
  #
  # Runs ONCE per release (wasm is platform-independent) on ubuntu. Applies
  # the same `wasm-opt -Oz --enable-bulk-memory` post-process as the build
  # script (T-131) when binaryen is available on the runner, then renames
  # each wasm to `ark-{plugin}-v{version}.wasm` and emits a `.sha256`
  # sidecar so consumers can verify downloads.
  # ---------------------------------------------------------------------------
  wasm-release:
    name: Build standalone wasm assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Same dual-trigger guard as the build job: workflow_dispatch
          # passes the requested tag via inputs.tag; tag-push uses
          # github.ref. Default behaviour would grab the branch tip.
          ref: ${{ inputs.tag || github.ref }}

      - name: Determine version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF:-}"
          if [[ "$ref" == refs/tags/v* ]]; then
            version="${ref#refs/tags/v}"
          else
            # workflow_dispatch path
            version="${{ github.event.inputs.tag }}"
            version="${version#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm

      - name: Build status plugin
        run: cargo build --target wasm32-wasip1 --release -p ark-plugin-status

      - name: Build picker plugin
        run: cargo build --target wasm32-wasip1 --release -p ark-plugin-picker

      - name: Optional wasm-opt post-process
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y binaryen || echo "binaryen not available, skipping"
          if command -v wasm-opt >/dev/null; then
            for plugin in ark_plugin_status ark_plugin_picker; do
              wasm-opt -Oz --enable-bulk-memory \
                "target/wasm32-wasip1/release/${plugin}.wasm" \
                -o "target/wasm32-wasip1/release/${plugin}.wasm.opt"
              mv "target/wasm32-wasip1/release/${plugin}.wasm.opt" \
                 "target/wasm32-wasip1/release/${plugin}.wasm"
            done
          fi

      - name: Rename and checksum
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          cp target/wasm32-wasip1/release/ark_plugin_status.wasm "ark-status-v${V}.wasm"
          cp target/wasm32-wasip1/release/ark_plugin_picker.wasm "ark-picker-v${V}.wasm"
          sha256sum "ark-status-v${V}.wasm" > "ark-status-v${V}.wasm.sha256"
          sha256sum "ark-picker-v${V}.wasm" > "ark-picker-v${V}.wasm.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-assets
          path: |
            ark-status-*.wasm
            ark-picker-*.wasm
            ark-status-*.wasm.sha256
            ark-picker-*.wasm.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # release: collect every target's tarball + checksum and publish a single
  # GitHub Release against the pushed tag.
  # ---------------------------------------------------------------------------
  release:
    name: publish github release
    needs:
      - build
      - wasm-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Keep the release job on the tag under workflow_dispatch so the
          # release body's auto-generated notes diff the right commit range.
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( \
            -name "*.tar.xz" \
            -o -name "*.wasm" \
            -o -name "*.sha256" \
          \) -exec cp {} release/ \;
          ls -la release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Under workflow_dispatch github.ref_name is the branch (e.g. "main"),
          # not the v* tag — the release would land on the wrong ref. Prefer
          # inputs.tag when present (manual dispatch) and fall back to
          # github.ref_name for the tag-push path.
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.tar.xz
            release/*.wasm
            release/*.sha256

  # ---------------------------------------------------------------------------
  # homebrew-publish: regenerate Formula/ark.rb in the rlch/homebrew-ark tap
  # so `brew install rlch/ark/ark` resolves against the new release (F-707).
  #
  # Guarded on the HOMEBREW_TAP_TOKEN secret: if the tap PAT is not
  # configured (e.g. on a first-time release from a fork), the job no-ops
  # with a notice instead of failing the workflow. The secret must grant
  # `contents: write` on github.com/rlch/homebrew-ark.
  #
  # Layout contract: the formula's `def install` block expects the tarball
  # root dir (`ark-<version>-<target>/`) to contain `ark` + `ark-hook`,
  # matching the `Stage artifacts` step of the build job above.
  # ---------------------------------------------------------------------------
  homebrew-publish:
    name: publish homebrew formula
    needs:
      - release
    runs-on: ubuntu-latest
    # Guard: skip entirely when the tap deploy token is missing so
    # first-time tag pushes from a fresh repo do not fail. Evaluated
    # against the environment variable (secret context is not allowed
    # directly in `if:` expressions on job level in all runners, but
    # reading via env works universally).
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # F-714: hard-code the canonical tap owner so forks don't
      # accidentally push to `<fork>/homebrew-ark` (which usually
      # doesn't exist) and so the rendered formula references the
      # canonical `rlch/ark` release tarballs. Forks that genuinely
      # mirror the tap can override `HOMEBREW_TAP_OWNER` via
      # `vars.HOMEBREW_TAP_OWNER` without editing the workflow.
      HOMEBREW_TAP_OWNER: ${{ vars.HOMEBREW_TAP_OWNER || 'rlch' }}
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Check tap token
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not configured — skipping tap publish." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: ver
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF:-}"
          if [[ "$ref" == refs/tags/v* ]]; then
            version="${ref#refs/tags/v}"
          else
            version="${{ github.event.inputs.tag }}"
            version="${version#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect SHA256 sums
        id: sums
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          # Each .sha256 file is of the form `<hex>  <filename>` — pick the
          # hex field only. File layout matches release.yml Stage step.
          sum_for() {
            local target="$1"
            local f
            f=$(find dist -type f -name "ark-${V}-${target}.tar.xz.sha256" | head -n1)
            if [[ -z "$f" ]]; then
              echo "missing sha256 for target ${target}" >&2
              exit 1
            fi
            awk '{print $1}' "$f"
          }
          {
            echo "arm_darwin=$(sum_for aarch64-apple-darwin)"
            echo "x86_darwin=$(sum_for x86_64-apple-darwin)"
            echo "arm_linux=$(sum_for aarch64-unknown-linux-gnu)"
            echo "x86_linux=$(sum_for x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Render formula
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/Formula
          # F-714: pass the canonical tap owner (HOMEBREW_TAP_OWNER, defaults
          # to `rlch`) rather than `github.repository_owner`, so forks don't
          # emit a formula that points at `<fork>/ark/releases/...` — the
          # release tarballs only live on the canonical repo.
          scripts/generate-brew-formula.sh \
            "${{ steps.ver.outputs.version }}" \
            "${HOMEBREW_TAP_OWNER}" \
            "${{ steps.sums.outputs.arm_darwin }}" \
            "${{ steps.sums.outputs.x86_darwin }}" \
            "${{ steps.sums.outputs.arm_linux }}" \
            "${{ steps.sums.outputs.x86_linux }}" \
            > out/Formula/ark.rb
          echo "--- rendered Formula/ark.rb ---"
          cat out/Formula/ark.rb

      - name: Clone tap and push formula
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          # F-714: clone the canonical tap repo (HOMEBREW_TAP_OWNER,
          # defaults to `rlch`) rather than `github.repository_owner`.
          # Prevents a fork from pushing a formula into a nonexistent
          # `<fork>/homebrew-ark` and failing the release publish.
          OWNER="${HOMEBREW_TAP_OWNER}"
          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${OWNER}/homebrew-ark.git" "${tap_dir}"
          mkdir -p "${tap_dir}/Formula"
          cp out/Formula/ark.rb "${tap_dir}/Formula/ark.rb"
          cd "${tap_dir}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/ark.rb; then
            echo "Formula/ark.rb unchanged for v${V}; nothing to push."
            exit 0
          fi
          git add Formula/ark.rb
          git commit -m "ark ${V}"
          git push origin HEAD
