[package]
name = "ark-plugin-picker"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
# zellij-tile 0.44 matches the zellij 0.44.x runtime targeted by cavekit-mux-zellij.
# Pinned locally (also mirrored in ark-plugin-status) — no other workspace crate
# uses it, so it stays out of [workspace.dependencies].
zellij-tile = "0.44"
# nucleo-matcher (NOT fuzzy-matcher) is mandated by cavekit-plugin-picker R1:
# faster, lighter wasm footprint, only transitively pulls in `memchr`. The
# workspace already pins 0.3 so the picker shares a single version.
nucleo-matcher = { workspace = true }
serde = { workspace = true }
# shlex for tokenising the new-agent form's `cmd` field (cavekit-plugin-picker R6 /
# T-104). Tiny; already pulled in by `crates/cli`, so sharing the workspace
# version keeps wasm dedup clean and doesn't grow the dep graph.
shlex = { workspace = true }

# libc — F-609: picker bootstrap needs `geteuid()` as a UID fallback when
# the zellij plugin harness doesn't export `UID` in the env. libc is
# already transitively in the graph (via zellij-tile's deps) so pulling
# it in directly adds no resolved versions. Only used on unix; the
# wasm32-wasip1 target's unix cfg is satisfied but `geteuid()` is still
# gated behind `cfg(unix)` for the non-wasm non-unix host test fallback.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# NOTE: serde_json, humantime, and chrono are intentionally NOT listed here.
# cavekit-plugin-picker R1 and cavekit-distribution.md R3 ban them from the
# picker plugin to keep the wasm binary inside the T-131/T-132 size budget —
# hand-rolled formatters and parsers are used instead.
