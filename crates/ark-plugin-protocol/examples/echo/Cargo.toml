# T-PP-011 / T-PP-018 (cavekit-plugin-protocol R2): reference echo
# plugin. Not a workspace member — built standalone against
# `wasm32-wasip2` (rustc's native p2 target; no wasi-sdk).
#
# Build (once host bindings + derive are wired in T-PP-022):
#   cargo build -p echo --target wasm32-wasip2 --release --manifest-path \
#     crates/ark-plugin-protocol/examples/echo/Cargo.toml
#
# Dep policy: the echo example must NOT transitively pull in
# `arborium-sysroot`, `facet-kdl`, or `facet-format` (R12 regression).

[package]
name = "echo"
version = "0.0.0"
edition = "2024"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
# T-PP-018 (kit R2): `wit-bindgen` generates the guest bindings against
# `crates/ark-plugin-protocol/wit/plugin.wit`. No workspace pin yet —
# the echo crate is the ONLY guest in the repo, so the version lives
# here and will be hoisted to workspace-level when a second guest
# lands. 0.42 matches the MSRV + wasmtime 43 host line.
wit-bindgen = "0.42"

# T-PP-022 (kit R3, R9): the `#[derive(Plugin)]` macro emits the
# `ark-caps:v1` + `ark-meta:v1` custom sections directly into this
# crate's wasm binary via `#[link_section]` statics. Proc-macro crates
# are HOST-side deps only — `cargo tree -p echo --target wasm32-wasip2`
# MUST NOT include `syn`/`quote`/`postcard` here (R12 regression).
ark-plugin-sdk = { path = "../../../ark-plugin-sdk" }
